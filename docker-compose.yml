services:
  app:
    build: .
    command: npm run dev
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://app:password@postgres:5432/facebook_automation
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /app/uploads
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads

  worker:
    build: .
    command: npm run worker:dev
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://app:password@postgres:5432/facebook_automation
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /app/uploads
    depends_on:
      - postgres
      - redis
    volumes:
      - uploads:/app/uploads

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: facebook_automation
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  uploads:
